<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>إدارة M-R</title>
    <script src="site-data.js"></script>
    <style>
      :root {
        --ink: #09090b;
        --gold: #c9a44c;
        --paper: #f7f7f4;
        --line: #e4e4e7;
        --muted: #62626b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .container {
        width: min(1100px, calc(100% - 32px));
        margin: 0 auto;
      }

      .header {
        background: var(--ink);
        color: white;
        padding: 18px 0;
      }

      .header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        color: var(--gold);
        font-size: 26px;
        font-weight: 900;
      }

      .btn {
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        padding: 0 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-weight: 900;
      }

      .btn-dark {
        background: var(--ink);
        color: white;
      }

      .btn-gold {
        background: var(--gold);
        color: var(--ink);
      }

      .btn-danger {
        background: #fee2e2;
        color: #b91c1c;
      }

      main {
        padding: 34px 0 60px;
      }

      .grid {
        display: grid;
        gap: 18px;
      }

      .panel {
        background: white;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 22px;
        box-shadow: 0 8px 26px rgba(9, 9, 11, 0.04);
      }

      h1,
      h2 {
        margin: 0;
      }

      p {
        color: var(--muted);
        line-height: 1.8;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 14px;
        font-weight: 900;
      }

      input,
      textarea {
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 13px;
        font: inherit;
        background: white;
      }

      textarea {
        min-height: 88px;
        padding-top: 12px;
        resize: vertical;
      }

      .two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .product {
        display: grid;
        grid-template-columns: 86px 1fr auto;
        gap: 14px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
      }

      .product img {
        width: 86px;
        height: 74px;
        object-fit: cover;
        border-radius: 8px;
        background: #eee;
      }

      .product h3 {
        margin: 0 0 6px;
      }

      .product small {
        color: var(--muted);
      }

      .notice {
        display: none;
        border-radius: 8px;
        background: #dcfce7;
        color: #166534;
        padding: 12px 14px;
        font-weight: 900;
      }

      @media (max-width: 760px) {
        .two,
        .three {
          grid-template-columns: 1fr;
        }

        .product {
          grid-template-columns: 74px 1fr;
        }

        .product .actions {
          grid-column: 1 / -1;
          display: flex;
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="container header-inner">
        <div class="brand">M-R Admin</div>
        <a class="btn btn-gold" href="index.html">عرض الموقع</a>
      </div>
    </header>

    <main class="container grid">
      <section class="panel">
        <h1>إدارة الموقع</h1>
        <p>هذه اللوحة تعمل بدون سيرفر. أي تغيير تحفظه سيظهر في `index.html` على نفس المتصفح والجهاز.</p>
        <p>بعد التعديل اضغط على زر تصدير ملف الموقع، ثم ارفع ملف `site-data.js` الجديد إلى GitHub.</p>
        <div class="notice" id="notice">تم الحفظ بنجاح.</div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px">
          <button class="btn btn-gold" type="button" id="exportButton">تصدير ملف الموقع</button>
          <button class="btn" type="button" id="resetButton">استرجاع البيانات الأصلية</button>
        </div>
      </section>

      <section class="panel">
        <h2>أرقام التواصل</h2>
        <form class="grid two" id="settingsForm" style="margin-top: 18px">
          <label>
            رقم زر الاتصال
            <input id="phoneInput" required placeholder="0550 00 00 00" />
          </label>
          <label>
            رقم واتساب بصيغة دولية
            <input id="whatsappInput" required placeholder="213550000000" />
          </label>
          <button class="btn btn-dark" type="submit">حفظ الأرقام</button>
        </form>
      </section>

      <section class="panel">
        <h2>إضافة أو تعديل منتج</h2>
        <form class="grid" id="productForm" style="margin-top: 18px">
          <input type="hidden" id="editIndex" value="" />
          <div class="grid two">
            <label>
              اسم المنتج
              <input id="nameInput" required />
            </label>
            <label>
              التصنيف
              <input id="categoryInput" required placeholder="إلكترونيات" />
            </label>
          </div>
          <div class="grid three">
            <label>
              السعر
              <input id="priceInput" required placeholder="8,900 دج" />
            </label>
            <label>
              السعر قبل التخفيض
              <input id="oldPriceInput" placeholder="11,900 دج" />
            </label>
            <label>
              نسبة الخصم
              <input id="discountInput" placeholder="خصم 25%" />
            </label>
          </div>
          <label>
            رابط صورة المنتج
            <input id="imageInput" required placeholder="https://..." />
          </label>
          <label>
            وصف المنتج
            <textarea id="descriptionInput" required></textarea>
          </label>
          <div style="display: flex; gap: 10px; flex-wrap: wrap">
            <button class="btn btn-dark" type="submit">حفظ المنتج</button>
            <button class="btn" type="button" id="clearFormButton">تفريغ النموذج</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <h2>قائمة المنتجات</h2>
        <div class="grid" id="productsList" style="margin-top: 18px"></div>
      </section>
    </main>

    <script>
      const defaultSettings = window.MR_SITE_DATA?.settings || {
        phone: "0550 00 00 00",
        whatsapp: "213550000000"
      };

      const defaultProducts = window.MR_SITE_DATA?.products || [];

      function readJson(key, fallback) {
        try {
          return JSON.parse(localStorage.getItem(key)) || fallback;
        } catch {
          return fallback;
        }
      }

      function saveJson(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      function showNotice() {
        const notice = document.getElementById("notice");
        notice.style.display = "block";
        setTimeout(() => {
          notice.style.display = "none";
        }, 1800);
      }

      function getCurrentSiteData() {
        return {
          settings: readJson("mr_settings", defaultSettings),
          products: getProducts()
        };
      }

      function downloadSiteData() {
        const data = getCurrentSiteData();
        const fileContent = `window.MR_SITE_DATA = ${JSON.stringify(data, null, 2)};\n`;
        const blob = new Blob([fileContent], { type: "text/javascript;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "site-data.js";
        link.click();
        URL.revokeObjectURL(link.href);
      }

      function loadSettings() {
        const settings = readJson("mr_settings", defaultSettings);
        document.getElementById("phoneInput").value = settings.phone || "";
        document.getElementById("whatsappInput").value = settings.whatsapp || "";
      }

      function getProducts() {
        const storedProducts = localStorage.getItem("mr_products");
        if (!storedProducts) {
          saveJson("mr_products", defaultProducts);
          return defaultProducts;
        }
        return readJson("mr_products", defaultProducts);
      }

      function renderProducts() {
        const products = getProducts();
        const list = document.getElementById("productsList");

        if (!products.length) {
          list.innerHTML = "<p>لا توجد منتجات حالياً.</p>";
          return;
        }

        list.innerHTML = products.map((product, index) => `
          <article class="product">
            <img src="${product.image}" alt="${product.name}" />
            <div>
              <h3>${product.name}</h3>
              <small>${product.category} · ${product.price}</small>
              <p style="margin: 6px 0 0">${product.description}</p>
            </div>
            <div class="actions">
              <button class="btn" type="button" onclick="editProduct(${index})">تعديل</button>
              <button class="btn btn-danger" type="button" onclick="deleteProduct(${index})">حذف</button>
            </div>
          </article>
        `).join("");
      }

      function clearProductForm() {
        document.getElementById("productForm").reset();
        document.getElementById("editIndex").value = "";
      }

      function editProduct(index) {
        const product = getProducts()[index];
        document.getElementById("editIndex").value = String(index);
        document.getElementById("nameInput").value = product.name;
        document.getElementById("categoryInput").value = product.category;
        document.getElementById("priceInput").value = product.price;
        document.getElementById("oldPriceInput").value = product.oldPrice || "";
        document.getElementById("discountInput").value = product.discount || "";
        document.getElementById("imageInput").value = product.image;
        document.getElementById("descriptionInput").value = product.description;
        window.scrollTo({ top: document.getElementById("productForm").offsetTop - 80, behavior: "smooth" });
      }

      function deleteProduct(index) {
        if (!confirm("هل تريد حذف هذا المنتج؟")) return;
        const products = getProducts();
        products.splice(index, 1);
        saveJson("mr_products", products);
        renderProducts();
        showNotice();
      }

      document.getElementById("settingsForm").addEventListener("submit", (event) => {
        event.preventDefault();
        saveJson("mr_settings", {
          phone: document.getElementById("phoneInput").value,
          whatsapp: document.getElementById("whatsappInput").value
        });
        showNotice();
      });

      document.getElementById("productForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const products = getProducts();
        const editIndex = document.getElementById("editIndex").value;
        const product = {
          name: document.getElementById("nameInput").value,
          category: document.getElementById("categoryInput").value,
          price: document.getElementById("priceInput").value,
          oldPrice: document.getElementById("oldPriceInput").value,
          discount: document.getElementById("discountInput").value,
          image: document.getElementById("imageInput").value,
          description: document.getElementById("descriptionInput").value
        };

        if (editIndex === "") {
          products.unshift(product);
        } else {
          products[Number(editIndex)] = product;
        }

        saveJson("mr_products", products);
        clearProductForm();
        renderProducts();
        showNotice();
      });

      document.getElementById("clearFormButton").addEventListener("click", clearProductForm);

      document.getElementById("exportButton").addEventListener("click", downloadSiteData);

      document.getElementById("resetButton").addEventListener("click", () => {
        if (!confirm("هل تريد حذف التعديلات المحلية والعودة إلى البيانات الموجودة في site-data.js؟")) return;
        localStorage.removeItem("mr_settings");
        localStorage.removeItem("mr_products");
        loadSettings();
        renderProducts();
        showNotice();
      });

      loadSettings();
      renderProducts();
    </script>
  </body>
</html>
